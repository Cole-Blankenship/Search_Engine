<!DOCTYPE html>
<html>
<head>
    <title>Search Engine</title>
    <style>
        body {
            font-family: monospace;
            background-color: rgb(255, 255, 255);
            margin: 20px;
        }
        .search-container {
            text-align: center;
            margin-top: 50px;
        }
        .search-bar {
            margin-top: 20px;
        }
        table {
            width: 100%;
            margin: 0 auto;
            border: 1px solid #ff073a;
            background-color: #ff073a;
        }
        td {
            text-align: center;
        }
        td input {
            width: 50%;
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff073a;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="search-container">
        <form action="/search" method="get">
            <table>
                <tr>
                    <td>
                        <font size="+3" face="monospace" color="white">
                            Search Query
                        </font>
                    </td>
                </tr>
            </table>
            <div class="search-bar">
                <label for="query">Enter your search query:</label>
                <br>
                <input type="text" name="query" id="query" placeholder="Search..." required>
                <br><br>
                <button type="submit">Search</button>
            </div>
        </form>
    </div>
</body>
</html>
